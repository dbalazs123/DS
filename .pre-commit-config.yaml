# Run `pre-commit install` once, then hooks run on every commit.
# Manual full run: `pre-commit run --all-files`.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # Strip notebook outputs before they land in git: no bloated diffs, no
  # accidentally-committed data. notebooks/ is a first-class folder here.
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  # Run mypy through uv so it type-checks against the real project environment
  # (pandas-stubs, sklearn, etc.) rather than an isolated, partial one.
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
