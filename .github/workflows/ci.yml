name: CI

on:
  push:
    branches: ["master", "claude/**"]
  pull_request:
    branches: ["master"]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # Runs ruff, ruff-format, mypy and hygiene hooks exactly as a contributor
      # would locally, validating the pre-commit config itself.
      - name: pre-commit
        run: uv run pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Test (pytest, with coverage gate)
        run: uv run pytest

  # The default `test` job installs only the lean core, so extra-backed code
  # paths never run. This job adds just tiktoken — the one optional dependency
  # exercised by existing code (ds.modeling.nlp.count_tokens) — so its accurate
  # path runs, not only the fallback. We deliberately avoid the full `nlp`/`all`
  # extras: they pull heavyweight stacks (sentence-transformers -> torch, sktime)
  # that no code touches yet, and extra *resolution* is already guaranteed by
  # uv.lock. Widen this as heavier extra-backed code lands.
  test-extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Test with tiktoken available
        run: uv run --with tiktoken pytest
