name: Docs

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Permissions the Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent Pages deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # Strict build doubles as a docs test: broken references fail CI.
      - name: Build docs
        run: uv run mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    # Validate docs on PRs (build job only); publish to Pages on master pushes.
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
