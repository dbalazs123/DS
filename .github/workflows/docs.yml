name: Docs

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      # Strict build doubles as a docs test: broken references fail CI.
      - name: Build docs
        run: uv run mkdocs build --strict

      # Publish the rendered site as a downloadable artifact. This works on the
      # free plan for public and private repos alike — no GitHub Pages required.
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site
          retention-days: 30
